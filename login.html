<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Saver Pro Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="card">

    <h1>💰 Money Saver Pro</h1>

    <!-- Sign In -->
    <div id="loginSection">

        <h2>Sign In</h2>

        <input
            id="loginEmail"
            type="email"
            placeholder="Email">

        <input
            id="loginPassword"
            type="password"
            placeholder="Password">

        <button onclick="login()">
            🔑 Sign In
        </button>

        <p>Don't have an account?</p>

        <button onclick="showSignup()">
            Create Account
        </button>

    </div>

    <!-- Create Account -->
    <div id="signupSection" style="display:none;">

        <h2>Create Account</h2>

        <input
            id="name"
            type="text"
            placeholder="Your Name">

        <input
            id="signupEmail"
            type="email"
            placeholder="Email">

        <input
            id="signupPassword"
            type="password"
            placeholder="Password">

        <button onclick="signup()">
            Create Account
        </button>

        <button onclick="showLogin()">
            Back to Sign In
        </button>

    </div>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
